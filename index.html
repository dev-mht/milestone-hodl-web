<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone HODL (MHT) - Dashboard Officiel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #8b5cf6;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn-connect {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .btn-connect:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .hero-section {
            padding: 80px 0;
            text-align: center;
        }

        .stats-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            height: 100%;
        }

        .token-logo-css {
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .baron-img {
            max-width: 300px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <div class="navbar-brand d-flex align-items-center">
                <div class="token-logo-css me-3">
                    <i class="bi bi-gem text-white fs-4"></i>
                </div>
                <span style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; font-weight: 700;">
                    MILESTONE <span class="text-primary">HODL</span>
                </span>
            </div>
            
            <button class="btn-connect" id="btn-connect">
                <i class="bi bi-wallet2 me-2"></i>Connecter Wallet
            </button>
        </div>
    </nav>

    <div class="container">
        <section class="hero-section">
            <img src="baron.png" alt="Le Jeune Baron" class="baron-img shadow-lg mb-4">
            <h1 class="display-4 fw-bold mb-3" style="font-family: 'Orbitron', sans-serif;">BIENVENUE, BARON</h1>
            <p class="lead text-secondary">Suivez l'évolution de vos actifs Milestone HODL (MHT) en temps réel.</p>
        </section>

        <div class="row g-4 mb-5 text-center">
            <div class="col-md-6">
                <div class="stats-card">
                    <h5 class="text-secondary mb-3">Statut du Wallet</h5>
                    <div id="status-text" class="h6 text-danger">Non connecté</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stats-card">
                    <h5 class="text-secondary mb-3">Votre Solde MHT</h5>
                    <div id="balance-value" class="h3 fw-bold">0.00 MHT</div>
                </div>
            </div>
        </div>

        <div class="row mb-5 justify-content-center">
            <div class="col-md-8">
                <div class="stats-card">
                    <h4 class="mb-4 text-center">Répartition des Jetons (Tokenomics)</h4>
                    <canvas id="tokenChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Configuration du graphique
        const ctx = document.getElementById('tokenChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Public Sale', 'Liquidité DEX', 'Équipe', 'Marketing', 'Réserve'],
                datasets: [{
                    data: [40, 30, 10, 10, 10],
                    backgroundColor: ['#3b82f6', '#8b5cf6', '#1e293b', '#64748b', '#0ea5e9'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: {
                    legend: { labels: { color: 'white' } }
                }
            }
        });
    </script>
    
    <script src="app.js"></script>

</body>
</html>
