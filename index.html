<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHT . MILESTONE HODL TOKEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #3b82f6; --secondary-color: #8b5cf6; --dark-bg: #0f172a; --card-bg: #1e293b; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0.5rem 1rem; }
        .nav-logo { width: 40px; height: 40px; object-fit: contain; }
        .brand-text { font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 1.2rem; letter-spacing: 1px; }
        .btn-connect { background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); border: none; color: white; padding: 6px 18px; border-radius: 50px; font-weight: bold; font-size: 0.8rem; transition: 0.3s; }

        /* Dashboard */
        .main-title { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: #ff0000; margin: 20px 0 10px 0; text-align: center; font-weight: bold; }
        .milestone-container { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1400px; margin: 0 auto 20px auto; padding: 0 20px; }
        .milestone-logo { width: 150px; height: 150px; object-fit: contain; } 
        .progress-box { flex-grow: 1; max-width: 700px; background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

        .main-dashboard { display: flex; align-items: stretch; justify-content: space-between; width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 40px; gap: 20px; }
        .token-col, .wallet-col { width: 320px; display: flex; flex-direction: column; justify-content: space-between; }
        .center-col { display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .wallet-card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
        .chart-container { position: relative; width: 220px; height: 220px; margin: 0 auto; }
        .baron-img { width: 400px; height: 250px; object-fit: cover; border-radius: 200px / 125px; border: 3px solid var(--primary-color); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .btn-buy { background: #22c55e; color: white; border: none; padding: 10px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; font-size: 0.9rem; margin-top: 10px; }

        /* ==========================================
           RESPONSIVE DESIGN (MOBILE & TABLET)
           ========================================== */
        @media (max-width: 992px) {
            .milestone-container { flex-direction: column; gap: 10px; }
            .milestone-logo { width: 100px; height: 100px; }
            .main-dashboard { flex-direction: column; padding: 0 20px; align-items: center; }
            .token-col, .wallet-col, .center-col { width: 100%; max-width: 450px; }
            .baron-img { width: 100%; height: auto; border-radius: 20px; }
            .center-col { order: -1; margin-bottom: 30px; } /* Met le Baron en haut sur mobile */
            .brand-text { font-size: 0.9rem; }
            .progress-box { width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <div class="navbar-brand d-flex align-items-center">
                <img src="logo.png" alt="MHT Logo" class="nav-logo me-2">
                <span class="brand-text">MHT . MILESTONE HODL TOKEN</span>
            </div>
            <button class="btn-connect" id="connectWalletBtn">Connect</button>
        </div>
    </nav>

    <div class="container-fluid">
        <h1 class="main-title">REWARDING GROWTH, NOT LUCK.</h1>
        
        <div class="milestone-container">
            <img src="logo.png" class="milestone-logo d-none d-lg-block" alt="Logo">
            <div class="progress-box">
                <p class="text-center small mb-2 fw-bold">Next $10M Milestone:</p>
                <div class="progress" style="height: 25px; border-radius: 50px; background: #334155;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 35%; font-weight: bold;">$3.5M / $10M</div>
                </div>
            </div>
            <img src="logo.png" class="milestone-logo d-none d-lg-block" alt="Logo">
        </div>

        <div class="main-dashboard">
            <div class="token-col">
                <div class="wallet-card text-center">
                    <h6 class="small text-secondary mb-3 fw-bold">TOKEN ALLOCATION</h6>
                    <div class="chart-container"><canvas id="tokenChart"></canvas></div>
                    <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 15px;">20% Liquidity on PancakeSwap via PinkSale</p>
                </div>
            </div>

            <div class="center-col">
                <img src="baron.png" alt="The Baron" class="baron-img">
                <a href="https://pancakeswap.finance" target="_blank" class="btn-buy">Buy on PancakeSwap</a>
            </div>

            <div class="wallet-col">
                <div class="wallet-card text-center"><small class="text-secondary d-block">Status</small><span class="fw-bold text-danger">Not Connected</span></div>
                <div class="wallet-card text-center"><small class="text-secondary d-block">Balance</small><span class="fw-bold">0.00 MHT</span></div>
                <div class="wallet-card text-center"><small class="text-secondary d-block">Market Cap</small><span class="fw-bold text-success">$1,245,000</span></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('tokenChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Milestones', 'Liquidity', 'Presale', 'Marketing', 'Team'],
                datasets: [{
                    data: [50, 20, 15, 10, 5],
                    backgroundColor: ['#3b82f6', '#64748b', '#10b981', '#f59e0b', '#ef4444'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { display: false } }, cutout: '65%', maintainAspectRatio: true }
        });

        document.getElementById('connectWalletBtn').addEventListener('click', function() {
            alert("Mobile Wallet connection coming soon!");
        });
    </script>
</body>
</html>
