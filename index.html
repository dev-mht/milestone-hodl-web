<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHT . MILESTONE HODL TOKEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #3b82f6; --secondary-color: #8b5cf6; --dark-bg: #0f172a; --card-bg: #1e293b; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Navbar Optimisée */
        .navbar { 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(10px); 
            border-bottom: 2px solid rgba(59, 130, 246, 0.2); 
            padding: 0.8rem 2rem; 
        }
        .nav-logo { width: 45px; height: 45px; object-fit: contain; }
        
        .brand-text { 
            font-family: 'Orbitron', sans-serif; 
            font-weight: 700; 
            font-size: 1.4rem; /* Un peu plus gros */
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Nouveau Slogan Central */
        .nav-slogan {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        
        .btn-connect { 
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); 
            border: none; 
            color: white; 
            padding: 10px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 0.85rem; 
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .btn-connect:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(59, 130, 246, 0.5); }

        /* Dashboard & Responsive (Inchangé mais vérifié) */
        .main-title { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; color: #ff0000; margin: 30px 0 10px 0; text-align: center; font-weight: bold; text-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .milestone-container { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1400px; margin: 0 auto 30px auto; padding: 0 40px; }
        .milestone-logo { width: 180px; height: 180px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(59,130,246,0.3)); } 
        .progress-box { flex-grow: 1; max-width: 700px; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

        .main-dashboard { display: flex; align-items: stretch; justify-content: space-between; width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 40px; gap: 30px; }
        .token-col, .wallet-col { width: 340px; display: flex; flex-direction: column; justify-content: space-between; }
        .center-col { display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .wallet-card { background: var(--card-bg); border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .chart-container { position: relative; width: 240px; height: 240px; margin: 0 auto; }
        .baron-img { width: 450px; height: 280px; object-fit: cover; border-radius: 225px / 140px; border: 4px solid var(--primary-color); box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); }
        .btn-buy { background: #22c55e; color: white; border: none; padding: 12px 40px; border-radius: 50px; font-weight: bold; text-decoration: none; font-size: 1rem; margin-top: 15px; transition: 0.3s; }
        .btn-buy:hover { transform: scale(1.05); background: #16a34a; }

        /* Ajustements Mobile */
        @media (max-width: 992px) {
            .nav-slogan { display: none; } /* On cache le slogan sur mobile pour gagner de la place */
            .milestone-container { flex-direction: column; gap: 20px; }
            .milestone-logo { width: 120px; height: 120px; }
            .main-dashboard { flex-direction: column; padding: 0 20px; }
            .token-col, .wallet-col, .center-col { width: 100%; }
            .baron-img { width: 100%; height: auto; border-radius: 20px; }
            .center-col { order: -1; margin-bottom: 40px; }
            .brand-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid d-flex align-items-center">
            <div class="d-flex align-items-center">
                <img src="logo.png" alt="MHT Logo" class="nav-logo me-3">
                <span class="brand-text">MHT . MILESTONE HODL TOKEN</span>
            </div>

            <div class="nav-slogan d-none d-lg-block">
                Trust the process • Earn the growth
            </div>

            <div class="ms-auto">
                <button class="btn-connect" id="connectWalletBtn"><i class="bi bi-wallet2 me-2"></i>Connect</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <h1 class="main-title">REWARDING GROWTH, NOT LUCK.</h1>
        
        <div class="milestone-container">
            <img src="logo.png" class="milestone-logo d-none d-lg-block" alt="Logo">
            <div class="progress-box">
                <p class="text-center small mb-2 fw-bold text-secondary">NEXT $10M MILESTONE PROGRESSION</p>
                <div class="progress" style="height: 30px; border-radius: 50px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 35%; font-weight: bold; font-size: 0.9rem;">$3.5M / $10M</div>
                </div>
            </div>
            <img src="logo.png" class="milestone-logo d-none d-lg-block" alt="Logo">
        </div>

        <div class="main-dashboard">
            <div class="token-col">
                <div class="wallet-card text-center" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <h6 class="small text-secondary mb-3 fw-bold">TOKEN ALLOCATION</h6>
                        <div class="chart-container"><canvas id="tokenChart"></canvas></div>
                    </div>
                    <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 20px; font-style: italic;">
                        <i class="bi bi-patch-check-fill text-primary"></i> 20% Locked Liquidity on PancakeSwap
                    </p>
                </div>
            </div>

            <div class="center-col">
                <img src="baron.png" alt="The Baron" class="baron-img">
                <a href="https://pancakeswap.finance" target="_blank" class="btn-buy">Buy MHT on PancakeSwap</a>
            </div>

            <div class="wallet-col">
                <div class="wallet-card"><small class="text-secondary d-block">Status</small><span class="fw-bold text-danger">Not Connected</span></div>
                <div class="wallet-card"><small class="text-secondary d-block">Your Balance</small><span class="fw-bold">0.00 MHT</span></div>
                <div class="wallet-card"><small class="text-secondary d-block">Current Market Cap</small><span class="fw-bold text-success">$1,245,000</span></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('tokenChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Milestones', 'Liquidity', 'Presale', 'Marketing', 'Team'],
                datasets: [{
                    data: [50, 20, 15, 10, 5],
                    backgroundColor: ['#3b82f6', '#64748b', '#10b981', '#f59e0b', '#ef4444'],
                    borderWidth: 0,
                    hoverOffset: 15
                }]
            },
            options: { plugins: { legend: { display: false } }, cutout: '70%', maintainAspectRatio: true }
        });

        document.getElementById('connectWalletBtn').addEventListener('click', function() {
            alert("Web3 Wallet integration coming soon!");
        });
    </script>
</body>
</html>
